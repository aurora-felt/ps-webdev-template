package:
  name: my-project
  dependencies:
    - aff
    - console
    - effect
    - halogen
    - maybe
    - prelude
    - strings
    - web-events
    - web-html
    - web-socket
  test:
    main: Test.Main
    dependencies: []
workspace:
  packageSet:
    registry: 77.11.1
  
